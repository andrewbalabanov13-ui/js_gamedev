<!DOCTYPE html>
<html>

<head>
  <title>Platform games</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }


    body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f5f5f5;
    }

    /* Add a black background color to the top navigation */
    .topnav {
      background-color: #333;
      overflow: hidden;
    }

    /* Style the links inside the navigation bar */
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    /* Change the color of links on hover */
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Add a color to the active/current link */
    .topnav a.active {
      background-color: #04AA6D;
      color: white;
    }

    /* Slideshow container */
    .slideshow-container {
      max-width: 1000px;
      width: 100%;
      height: 12vh;
      min-height: 90px;
      max-height: 140px;
      position: relative;
      margin: auto;
      overflow: hidden;
      border-radius: 8px;
      background: #ddd;
    }

    /* Hide the images by default */
    .mySlides {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .mySlides img {
      display: none;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: 8px;
    }


    /* Next & previous buttons */
    .prev,
    .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: auto;
      padding: 10px 14px;
      color: white;
      font-weight: bold;
      font-size: 20px;
      transition: 0.3s ease;
      border-radius: 4px;
      user-select: none;
      background: rgba(0, 0, 0, 0.45);
      z-index: 10;
    }

    .prev {
      left: 10px;
    }

    /* Position the "next button" to the right */
    .next {
      right: 10px;
    }

    /* On hover, add a black background color with a little bit see-through */
    .prev:hover,
    .next:hover {
      background-color: rgba(0, 0, 0, 0.7);
    }

    /* Caption text */
    .text {
      color: #fff;
      font-size: 14px;
      padding: 6px 10px;
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Number text (1/3 etc) */
    .numbertext {
      color: #fff;
      font-size: 12px;
      padding: 6px 10px;
      position: absolute;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 5;
    }

    .dot-wrap {
      text-align: center;
    }

    /* The dots/bullets/indicators */
    .dot {
      cursor: pointer;
      height: 12px;
      width: 12px;
      margin: 0 2px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.3s ease;
    }

    .active,
    .dot:hover {
      background-color: #717171;
    }

    /* Fading animation */
    .fade {
      animation: fade 0.5s;
    }

    @keyframes fade {
      from {
        opacity: 0.4;
      }

      to {
        opacity: 1;
      }
    }

    .frame-wrap {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
    }
  </style>
</head>

<body>
  <div class="topnav">
    <a class="active" href="../index.html">Home</a>
    <a href="other_games.html">Other Games</a>
    <a href="my_games.html">My Games</a>
  </div>
  <!--  -->
  <!-- Slideshow container -->
  <div class="slideshow-container" id="slideshow"></div>

  <!-- The dots/circles -->
  <div class="dots-wrap" id="dots"></div>

  <!-- Create a did  add an i frame to that div-->
  <div class="frame-wrap">
    <iframe id="slideFrame" src="" loading="lazy"></iframe>
  </div>

  <!--  -->
  <script>
    const slideData = [
      {
        img: "..//Media/git_website/Screenshot 2026-03-02 192050.png",
        caption: "Pop The Ballon",
        url: "..//games/1pop_the_ballon.html"
      },

      {

        caption: "Ping Pong",
        url: "..//games/2ping_pong.html"
      },
      
      {
        img: "..//Media/git_website/applegodownthing.png",
        caption: "Catch It",
        url: "..//games/3catch_it.html"
      },
      {
        img: "..//Media/git_website/dogndonut.png",
        caption: "Dog N Donut",
        url: "..//games/4_2dog_n_donut.html"
      },
      {
        img: "..//Media/git_website/Screenshot 2026-03-26 184237.png",
        caption: "Flappy Bird",
        url: "..//games/5_flappy_bird.html"
      },
      {
        img: "..//Media/git_website/spaceship.png",
        caption: "meteor storn",
        url: "..//games/6_meteor_storm.html"
      },
      {
        img: "..//Media/git_website/Screenshot 2026-03-26 184259.png",
        caption: "Snake game",
        url: "..//games/7_snake_game.html"
      },
      {
        img: "..//Media/git_website/breakit.png",
        caption: "Break It",
        url: "..//games/8_break_it.html"
      },
      // {
      //   img: "..//Media/git_website/Screenshot 2026-03-02 192050.png",
      //   caption: "Solatair",
      //   url: "..//games/9_solatair.html"
      // },


    ]

    let slideIndex = 1;
    const slideshow = document.getElementById("slideshow");
    const dotsContainer = document.getElementById("dots");
    const frame = document.getElementById("slideFrame");

    slideData.forEach((slide, index) => {
      const slideDiv = document.createElement('div');
      slideDiv.className = "mySlides fade";

      slideDiv.innerHTML = `
      <div class="numbertext">${index + 1}/${slideData.length}</div> 
      <img src="${slide.img}" alt="${slide.caption}">
      <div class="text">${slide.caption}</div>
      `;

      slideDiv.addEventListener('click', () => {
        frame.src = slide.url;
      });

      slideshow.append(slideDiv);
      const dot = document.createElement('span');
      dot.className = "dot";
      dot.onclick = () => currentSlide(index + 1);
      dotsContainer.appendChild(dot);
    });


    const prevBtn = document.createElement("a");
    prevBtn.className = 'prev';
    prevBtn.innerHTML = '&#10094';
    prevBtn.onclick = () => plusSlides(-1);

    const nextBtn = document.createElement("a");
    nextBtn.className = 'next';
    nextBtn.innerHTML = '&#10095';
    nextBtn.onclick = () => plusSlides(1);

    slideshow.appendChild(prevBtn);
    slideshow.appendChild(nextBtn);

    function plusSlides(n) {
      showSlides(slideIndex + n);
    }

    function showSlides(n) {
      const slides = document.getElementsByClassName("mySlides");
      const dots = document.getElementsByClassName("dot");

      if (n > slides.length) {
        slideIndex = 1;
      }
      else if (n < 1) {
        slideIndex = slides.length;
      }
      else { slideIndex = n; }

      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }

      for (let i = 0; i < dots.length; i++) {
        dots[i].classList.remove("active");
      }

      slides[slideIndex - 1].style.display = "block";
      dots[slideIndex - 1].classList.add("active");
      frame.src = slideData[slideIndex - 1].url;


    }

    showSlides(slideIndex);
  </script>
  <!--  -->

</body>


</html>
