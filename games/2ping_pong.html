<!DOCTYPE html>
<html>
  <head>
    <title>Pinky pongy</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }
      
      #board {
        position: absolute;
        width:100%;
        height: 450px;
        background-color: lightgreen;
      }
      #paddle {
        position: absolute;
        top: 425px;
        width: 80px;
        height: 20px;
        background-color: blue;
      }
      #ball {
        position: absolute;
        width: 48px;
        height: 48px;
        border-radius: 24px;
        background-color: yellow;
      }
    </style>
  </head>
  <body >
    <div id="board"  onmousemove="movePaddle(event)"></div>
    <div id="paddle"></div>
    <div id="ball"></div>

    <script>
      var x = 100;
      var y = 100;
      var speedX = 2;
      var speedY = 2;
      var paddleX = 0;

      function movePaddle(event) {
        paddleX = event.clientX;
        paddle.style.left = paddleX + "px";
      }

      function moveBall() {
        x = x+ speedX;
        y = y+ speedY;
        ball.style.left = x + "px";
        ball.style.top = y + "px";
   
         console.log( board.offsetHeight);
        if (x > board.offsetWidth) speedX = -2;
        if (x < 0) speedX = 2;
        if (y < 0) speedY = 2;
        if ((y > 372) && (Math.abs(paddleX - x) < 60)){ speedY = -2};
        if (y >  board.offsetHeight - 48) {
          alert("gama ova!");
          clearInterval(timer);
        }
      }
      var timer = setInterval(moveBall, 10);
    </script>
  </body>
</html>
